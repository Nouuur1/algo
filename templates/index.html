<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مغارة الحروف السحرية🌳</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      /* Même style que précédemment, inchangé */
      @import url("https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap");
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --primary: #ff6b6b;
        --secondary: #4ecdc4;
        --accent: #ffe66d;
        --dark: #2f2e41;
        --purple: #a855f7;
        --blue: #3b82f6;
        --green: #10b981;
        --orange: #f59e0b;
        --red: #ef4444;
        --bg-light: #f8fafc;
        --card-bg: rgba(255, 255, 255, 0.9);
        --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        --border-radius: 2rem;
      }
      body {
        font-family: "Cairo", sans-serif;
        background: linear-gradient(145deg, #f0f9ff 0%, #e6f7f0 100%);
        margin: 0;
        padding: 2rem 1.5rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        overflow-x: hidden;
      }
      /* ... (le reste du style est identique à l'original) ... */
      .game-header {
        text-align: center;
        margin-bottom: 2.5rem;
      }
      .game-header h1 {
        font-size: clamp(2.8rem, 8vw, 4.2rem);
        font-weight: 800;
        color: var(--primary);
        text-shadow:
          4px 4px 0 white,
          6px 6px 0 rgba(0, 0, 0, 0.1);
      }
      .game-header p {
        font-size: 1.3rem;
        color: var(--dark);
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(4px);
        display: inline-block;
        padding: 0.6rem 2rem;
        border-radius: 3rem;
        box-shadow: var(--shadow-sm);
      }
      nav {
        display: flex;
        justify-content: center;
        gap: 1.2rem;
        margin-bottom: 3rem;
        flex-wrap: wrap;
      }
      nav a {
        text-decoration: none;
        padding: 0.9rem 2.2rem;
        border-radius: 3rem;
        background: white;
        color: var(--dark);
        font-weight: 700;
        font-size: 1.1rem;
        box-shadow: 0 8px 0 #cbd5e1;
        transition: all 0.2s;
        border: 2px solid transparent;
      }
      nav a:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 0 #cbd5e1;
        background: var(--accent);
      }
      .mission-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 2rem;
        max-width: 1400px;
        width: 100%;
      }
      .mission-card {
        background: var(--card-bg);
        backdrop-filter: blur(8px);
        border-radius: var(--border-radius);
        padding: 2rem 1.5rem;
        box-shadow: var(--shadow-lg);
        border: 2px solid rgba(255, 255, 255, 0.8);
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
      }
      .mission-card:hover {
        transform: translateY(-8px) scale(1.02);
      }
      .mission-card h2 {
        margin: 0 0 1rem 0;
        font-size: 1.9rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding-bottom: 0.8rem;
        border-bottom: 6px solid;
      }
      .color-purple h2 {
        border-bottom-color: var(--purple);
      }
      .color-yellow h2 {
        border-bottom-color: var(--orange);
      }
      .color-green h2 {
        border-bottom-color: var(--green);
      }
      .color-red h2 {
        border-bottom-color: var(--red);
      }
      .color-blue h2 {
        border-bottom-color: var(--blue);
      }
      .color-indigo h2 {
        border-bottom-color: #6366f1;
      }
      .magic-input {
        width: 100%;
        padding: 1rem 1.5rem;
        border: 3px solid #e2e8f0;
        border-radius: 3rem;
        font-size: 1.2rem;
        font-family: "Cairo", sans-serif;
        outline: none;
        transition: all 0.2s;
        margin-bottom: 0.75rem;
        background: white;
        text-align: center;
        font-weight: 600;
      }
      .magic-input:focus {
        border-color: var(--primary);
        background: #fff9ed;
        box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.2);
      }
      .magic-btn {
        width: 100%;
        padding: 1rem 1.5rem;
        border: none;
        border-radius: 3rem;
        color: white;
        font-weight: 700;
        font-size: 1.3rem;
        cursor: pointer;
        box-shadow: 0 8px 0 rgba(0, 0, 0, 0.15);
        transition: all 0.1s;
        margin-bottom: 0.5rem;
        position: relative;
        overflow: hidden;
      }
      .magic-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 0 rgba(0, 0, 0, 0.15);
      }
      .magic-btn:active {
        transform: translateY(4px);
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.15);
      }
      .btn-group {
        display: flex;
        gap: 0.8rem;
        margin-top: 0.5rem;
      }
      .btn-group .magic-btn {
        margin-bottom: 0;
      }
      .scroll-box {
        margin-top: 1.5rem;
        max-height: 280px;
        overflow-y: auto;
        border-radius: 1.5rem;
        background: #f9fafc;
        padding: 0.5rem;
        border: 2px solid rgba(0, 0, 0, 0.03);
      }
      .result-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 0.5rem;
      }
      .result-table td {
        padding: 1rem 1.2rem;
        background: white;
        border-radius: 1.5rem;
        text-align: center;
        cursor: pointer;
        border: 2px solid #f1f5f9;
        transition: all 0.2s;
        position: relative;
        font-weight: 600;
        box-shadow: var(--shadow-sm);
      }
      .result-table td:hover {
        background: #fff9e6;
        border-color: var(--orange);
        transform: scale(1.02);
      }
      .result-table td::after {
        content: "🔊";
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.2rem;
        opacity: 0.4;
      }
      .analysis-root {
        color: var(--purple);
        font-size: 0.95rem;
        font-weight: 600;
        margin-top: 0.5rem;
        border-top: 1px dashed #ddd;
      }
      .deco-star {
        position: absolute;
        width: 8px;
        height: 8px;
        background: gold;
        border-radius: 50%;
        box-shadow: 0 0 12px gold;
        opacity: 0.6;
        animation: twinkle 3s infinite;
        pointer-events: none;
        z-index: 5;
      }
      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.2;
          transform: scale(0.8);
        }
        50% {
          opacity: 1;
          transform: scale(1.3);
        }
      }
      @media (max-width: 640px) {
        body {
          padding: 1rem;
        }
        .mission-card {
          padding: 1.5rem;
        }
        .btn-group {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="deco-star" style="top: 10%; left: 5%"></div>
    <div
      class="deco-star"
      style="top: 20%; right: 8%; animation-delay: 1s"
    ></div>
    <div
      class="deco-star"
      style="bottom: 15%; left: 12%; animation-delay: 0.5s"
    ></div>
    <div class="game-header animate__animated animate__bounceIn">
      <h1>✨ مغارة الكلمات ✨</h1>
      <p>
        مرحباً بك يا بطل! استكشف سحر اللغة العربية بالضغط على النتائج لسماعها.
      </p>
    </div>

    <nav>
      <a href="/view_roots">🌳 غابة الجذور</a>
      <a href="/view_schemes">📜 كتاب الأوزان</a>
      <a href="/visualize_tree">🌐 عرض الشجرة</a>
    </nav>

    <div class="mission-grid">
      <!-- Carte 1 : Identification -->
      <div class="mission-card color-purple animate__animated animate__zoomIn">
        <h2>🕵️ مجهر الكلمات</h2>
        <input
          type="text"
          id="iWord"
          class="magic-input"
          placeholder="اكتب كلمة هنا"
        />
        <button
          class="magic-btn"
          style="background: var(--purple)"
          onclick="api('/identify', { word: v('iWord') }, 'resId')"
        >
          حلل الكلمة
        </button>
        <div id="resId" class="scroll-box"></div>
      </div>

      <!-- Carte 2 : Génération -->
      <div
        class="mission-card color-yellow animate__animated animate__zoomIn"
        style="animation-delay: 0.1s"
      >
        <h2>🪄 عصا الاشتقاق</h2>
        <input
          type="text"
          id="rGen"
          class="magic-input"
          placeholder="3 حروف (مثلاً: كتب)"
        />
        <button
          class="magic-btn"
          style="background: var(--orange)"
          onclick="api('/generate_all', { root: v('rGen') }, 'resGen')"
        >
          اشتق الكلمات
        </button>
        <div id="resGen" class="scroll-box"></div>
      </div>

      <!-- Carte 3 : Vérification -->
      <div
        class="mission-card color-green animate__animated animate__zoomIn"
        style="animation-delay: 0.2s"
      >
        <h2>✅ ميزان العدالة</h2>
        <input
          type="text"
          id="vWord"
          class="magic-input"
          placeholder="الكلمة (مكتوب)"
        />
        <input
          type="text"
          id="vRoot"
          class="magic-input"
          placeholder="الجذر (كتب)"
        />
        <button
          class="magic-btn"
          style="background: var(--green)"
          onclick="
            api('/verify', { word: v('vWord'), root: v('vRoot') }, 'resV')
          "
        >
          تحقق ومزامنة
        </button>
        <div id="resV" class="scroll-box"></div>
      </div>

      <!-- Carte 4 : Gestion des racines -->
      <div
        class="mission-card color-red animate__animated animate__zoomIn"
        style="animation-delay: 0.3s"
      >
        <h2>⚙️ إدارة الجذور</h2>
        <input
          type="text"
          id="mRoot"
          class="magic-input"
          placeholder="3 حروف"
        />
        <div class="btn-group">
          <button
            class="magic-btn"
            style="background: var(--green)"
            onclick="api('/manage', { root: v('mRoot'), action: 'add' })"
          >
            ➕ إضافة
          </button>
          <button
            class="magic-btn"
            style="background: var(--red)"
            onclick="api('/manage', { root: v('mRoot'), action: 'delete' })"
          >
            ➖ حذف
          </button>
        </div>
      </div>

      <!-- Carte 5 : Gestion des schèmes -->
      <div
        class="mission-card color-blue animate__animated animate__zoomIn"
        style="animation-delay: 0.4s"
      >
        <h2>📏 إدارة الأوزان</h2>
        <input
          type="text"
          id="newScheme"
          class="magic-input"
          placeholder="اكتب الوزن (مثال: مفاعل)"
        />
        <input
          type="text"
          id="schemeCat"
          class="magic-input"
          placeholder="التصنيف (اختياري)"
        />
        <div class="btn-group">
          <button
            class="magic-btn"
            style="background: var(--blue)"
            onclick="manageScheme('add')"
          >
            ➕ إضافة وزن
          </button>
          <button
            class="magic-btn"
            style="background: #ef4444"
            onclick="manageScheme('delete')"
          >
            ➖ حذف وزن
          </button>
        </div>
        <div id="resScheme" class="scroll-box" style="margin-top: 1rem"></div>
      </div>

      <!-- Carte 6 : Statistiques (NOUVELLE) -->
      <div
        class="mission-card color-indigo animate__animated animate__zoomIn"
        style="animation-delay: 0.5s"
      >
        <h2>📊 إحصائيات سحرية</h2>
        <button
          class="magic-btn"
          style="background: #6366f1"
          onclick="getStats()"
        >
          اعرض الإحصائيات
        </button>
        <div
          id="statsResult"
          class="scroll-box"
          style="text-align: center"
        ></div>
      </div>

      <!-- Carte 7 : Recherche de dérivés (NOUVELLE) -->
      <div class="mission-card" style="border-bottom-color: #ec4899">
        <h2>🔍 بحث في المشتقات</h2>
        <input
          type="text"
          id="searchPattern"
          class="magic-input"
          placeholder="أدخل جزءاً من كلمة"
        />
        <button
          class="magic-btn"
          style="background: #ec4899"
          onclick="searchDerivatives()"
        >
          بحث
        </button>
        <div id="searchResult" class="scroll-box"></div>
      </div>
    </div>

    <script>
      const v = (id) => document.getElementById(id).value;

      function speakClean(word, scheme) {
        if ("speechSynthesis" in window) {
          window.speechSynthesis.cancel();
          const msg1 = new SpeechSynthesisUtterance(word);
          const msg2 = new SpeechSynthesisUtterance("على وزن " + scheme);
          [msg1, msg2].forEach((m) => {
            m.lang = "ar-SA";
            m.rate = 0.85;
          });
          window.speechSynthesis.speak(msg1);
          msg1.onend = () => {
            setTimeout(() => window.speechSynthesis.speak(msg2), 400);
          };
        }
      }

      async function api(path, data, resId) {
        const r = await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const res = await r.json();
        const box = document.getElementById(resId);

        if (res.error) {
          Swal.fire({
            icon: "error",
            title: "خطأ",
            text: res.error,
            confirmButtonText: "حسناً",
          });
          return;
        }
        if (res.success) {
          Swal.fire({
            icon: "success",
            title: "تم بنجاح",
            text: res.success,
            confirmButtonText: "حسناً",
          }).then(() => {
            location.reload();
          });
          return;
        }
        if (res.results) {
          let h = '<table class="result-table">';
          res.results.forEach((x) => {
            const word = x.word || x.root;
            const scheme = x.scheme;
            const rootVerbe = x.root;
            h += `<tr onclick="speakClean('${word}', '${scheme}')">
                    <td>
                      <div style="font-size:1.4rem; font-weight:900; color:var(--dark);">${word}</div>
                      <div style="color:var(--purple); font-size:1rem; font-weight:bold;">الوزن: ${scheme}</div>
                      ${rootVerbe ? `<div class="analysis-root">الفعل (الجذر): ${rootVerbe}</div>` : ""}
                    </td>
                  </tr>`;
          });
          box.innerHTML = h + "</table>";
        } else if (res.message) {
          const isError = res.message.includes("لا تنتمي");
          Swal.fire({
            icon: isError ? "error" : "success",
            title: isError ? "خطأ" : "صحيح",
            text: res.message,
            confirmButtonText: "حسناً",
          });
          box.innerHTML = "";
        }
      }

      async function manageScheme(action) {
        const name = v("newScheme").trim();
        const category = v("schemeCat").trim() || "عام";
        if (!name) {
          Swal.fire({
            icon: "warning",
            title: "تنبيه",
            text: "يرجى كتابة الوزن",
            confirmButtonText: "حسناً",
          });
          return;
        }
        const endpoint = action === "add" ? "/add_scheme" : "/delete_scheme";
        const data = { name: name, category: category };
        const r = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const res = await r.json();
        if (res.success) {
          Swal.fire({
            icon: "success",
            title: "تم بنجاح",
            text: res.success,
            confirmButtonText: "حسناً",
          }).then(() => {
            location.reload();
          });
        } else if (res.error) {
          Swal.fire({
            icon: "error",
            title: "خطأ",
            text: res.error,
            confirmButtonText: "حسناً",
          });
        }
      }

      // Nouvelle fonction pour les statistiques
      async function getStats() {
        const r = await fetch("/stats");
        const stats = await r.json();
        let html = `<div style="padding:1rem; text-align:right;">
                      <p>📊 عدد الجذور: ${stats.roots}</p>
                      <p>📜 عدد الأوزان: ${stats.schemes}</p>
                      <p>🍎 مجموع المشتقات: ${stats.total_derivatives}</p>
                      <p>🏆 أكثر جذر مشتقات: ${stats.max_derivatives_root || "—"} (${stats.max_derivatives_count})</p>
                    </div>`;
        document.getElementById("statsResult").innerHTML = html;
      }

      // Nouvelle fonction pour la recherche de dérivés
      async function searchDerivatives() {
        const pattern = v("searchPattern").trim();
        if (!pattern) {
          Swal.fire({
            icon: "warning",
            title: "تنبيه",
            text: "أدخل نصاً للبحث",
            confirmButtonText: "حسناً",
          });
          return;
        }
        const r = await fetch("/search_derivatives", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pattern: pattern }),
        });
        const data = await r.json();
        const box = document.getElementById("searchResult");
        if (data.results.length === 0) {
          box.innerHTML =
            '<p style="padding:1rem; color:gray;">لا توجد نتائج</p>';
          return;
        }
        let html = '<table class="result-table">';
        data.results.forEach((item) => {
          html += `<tr><td style="text-align:right;">
                      <div>${item.word} (${item.freq})</div>
                      <div style="color:var(--purple);">من الجذر: ${item.root}</div>
                    </td></tr>`;
        });
        html += "</table>";
        box.innerHTML = html;
      }
    </script>
  </body>
</html>
