<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>كتاب الأوزان - مغارة الكلمات</title>
    
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Même style que l'original, inchangé */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --primary-amber: #f59e0b;
        --dark-amber: #b45309;
        --light-amber: #fde68a;
        --bg-warm: #fffbeb;
        --card-bg: rgba(255, 255, 255, 0.95);
        --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        --border-radius: 2rem;
        --font-main: "Cairo", sans-serif;
      }
      body {
        font-family: var(--font-main);
        background: linear-gradient(145deg, #fffbeb 0%, #fef3c7 100%);
        padding: 2rem 1.5rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        overflow-x: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background:
          radial-gradient(
            circle at 70% 30%,
            rgba(245, 158, 11, 0.1) 0%,
            transparent 50%
          ),
          repeating-linear-gradient(
            45deg,
            rgba(245, 158, 11, 0.03) 0px,
            rgba(245, 158, 11, 0.03) 2px,
            transparent 2px,
            transparent 10px
          );
        pointer-events: none;
        z-index: 0;
        animation: rotateBg 180s linear infinite;
      }
      @keyframes rotateBg {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .back-link {
        align-self: flex-start;
        text-decoration: none;
        color: var(--dark-amber);
        font-weight: 700;
        font-size: 1.3rem;
        background: white;
        padding: 0.8rem 2rem;
        border-radius: 3rem;
        box-shadow:
          var(--shadow-sm),
          0 6px 0 #fcd34d;
        transition: all 0.2s ease;
        margin-bottom: 2rem;
        border: 2px solid transparent;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        position: relative;
        z-index: 10;
      }
      .back-link:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 0 #fcd34d;
        background: var(--light-amber);
        border-color: white;
      }
      .back-link:active {
        transform: translateY(4px);
        box-shadow: 0 2px 0 #fcd34d;
      }
      .page-header {
        text-align: center;
        margin-bottom: 3rem;
        position: relative;
        z-index: 10;
      }
      .page-header h1 {
        font-size: clamp(2.5rem, 6vw, 3.5rem);
        font-weight: 800;
        color: var(--dark-amber);
        text-shadow:
          3px 3px 0 white,
          5px 5px 0 rgba(0, 0, 0, 0.05);
        margin-bottom: 0.5rem;
      }
      .page-header p {
        font-size: 1.3rem;
        color: #b45309;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(4px);
        display: inline-block;
        padding: 0.5rem 2rem;
        border-radius: 3rem;
        box-shadow: var(--shadow-sm);
        border: 1px solid rgba(255, 255, 255, 0.6);
      }
      .schemes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 2rem;
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
        position: relative;
        z-index: 10;
      }
      .magic-page {
        background: var(--card-bg);
        backdrop-filter: blur(4px);
        border-radius: var(--border-radius);
        padding: 2rem 1.5rem;
        text-align: center;
        border: 4px solid var(--primary-amber);
        box-shadow:
          0 8px 0 #fde68a,
          var(--shadow-lg);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.8rem;
      }
      .magic-page:hover {
        transform: rotate(-1deg) scale(1.05);
        box-shadow:
          0 12px 0 #fcd34d,
          var(--shadow-xl);
        background: #fef9e7;
        border-color: #d97706;
      }
      .magic-page::before {
        content: "📜";
        position: absolute;
        bottom: 5px;
        left: 10px;
        font-size: 4rem;
        opacity: 0.1;
        pointer-events: none;
        transform: rotate(-10deg);
      }
      .magic-page::after {
        content: "✨";
        position: absolute;
        top: 5px;
        right: 10px;
        font-size: 2rem;
        opacity: 0.2;
        pointer-events: none;
      }
      .name {
        font-size: 2.2rem;
        font-weight: 900;
        color: var(--dark-amber);
        line-height: 1.2;
        word-break: break-word;
      }
      .cat {
        color: #d97706;
        font-size: 1.1rem;
        font-weight: 600;
        background: rgba(245, 158, 11, 0.1);
        padding: 0.2rem 1.2rem;
        border-radius: 3rem;
        display: inline-block;
      }
      .listen-hint {
        color: var(--primary-amber);
        font-size: 0.95rem;
        font-weight: 600;
        opacity: 0.8;
        margin-top: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }
      .listen-hint::before {
        content: "🔊";
        font-size: 1rem;
      }
      @media (max-width: 640px) {
        body {
          padding: 1rem;
        }
        .magic-page {
          padding: 1.5rem;
        }
        .name {
          font-size: 1.8rem;
        }
        .back-link {
          font-size: 1rem;
          padding: 0.6rem 1.2rem;
        }
      }
      .deco-star {
        position: absolute;
        width: 6px;
        height: 6px;
        background: #fbbf24;
        border-radius: 50%;
        box-shadow: 0 0 10px #fbbf24;
        opacity: 0.5;
        animation: twinkle 3s infinite;
        pointer-events: none;
        z-index: 1;
      }
      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.2;
          transform: scale(0.8);
        }
        50% {
          opacity: 1;
          transform: scale(1.3);
        }
      }
      .magic-page.clicked {
        animation: pagePop 0.3s ease;
      }
      @keyframes pagePop {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
          background: #fde68a;
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="deco-star" style="top: 10%; left: 5%"></div>
    <div
      class="deco-star"
      style="top: 20%; right: 8%; animation-delay: 1s"
    ></div>
    <div
      class="deco-star"
      style="bottom: 15%; left: 12%; animation-delay: 0.5s"
    ></div>
    <div
      class="deco-star"
      style="bottom: 25%; right: 15%; width: 10px; height: 10px"
    ></div>

    <a href="/" class="back-link animate__animated animate__fadeInRight"
      >⬅️ عودة إلى المغارة</a
    >

    <div class="page-header animate__animated animate__zoomIn">
      <h1>📜 كتاب الأوزان السحرية</h1>
      <p>تصفح الأوزان واستمع إليها بلمسة واحدة</p>
    </div>

    <div class="schemes-grid">
      {% for s in schemes %}
      <div class="magic-page" onclick="speak('{{ s.name }}')">
        <span class="name">{{ s.name }}</span>
        <span class="cat">✨ {{ s.cat }}</span>
        <span class="listen-hint">اضغط للسماع</span>
      </div>
      {% endfor %}
    </div>

    <script>
      function speak(text) {
        if ("speechSynthesis" in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = "ar-SA";
          utterance.rate = 0.9;
          window.speechSynthesis.speak(utterance);
        }
      }
      document.addEventListener("DOMContentLoaded", function () {
        const pages = document.querySelectorAll(".magic-page");
        pages.forEach((page) => {
          page.addEventListener("click", function (e) {
            this.classList.add("clicked");
            setTimeout(() => {
              this.classList.remove("clicked");
            }, 300);
          });
        });
      });
    </script>
  </body>
</html>
